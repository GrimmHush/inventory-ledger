name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory_user
          POSTGRES_PASSWORD: inventory_pass
          POSTGRES_DB: inventory_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_user -d inventory_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://inventory_user:inventory_pass@localhost:5432/inventory_db?schema=public

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # web workspace (its own jsdom + fake-indexeddb vitest config; no lint
      # script of its own, and the root ESLint config ignores web/).
      # Must run AFTER `npm run build`: web resolves `inventory-ledger` through the
      # package exports map (built dist/), not the TS source, so running these
      # before build fails with TS2307 (cannot find module 'inventory-ledger').
      - run: npm run typecheck -w @inventory-ledger/web
      - run: npm test -w @inventory-ledger/web
